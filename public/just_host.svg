<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="100%" height="100%">
    <defs>
        <style>
            /* Main color matching the deep navy from the image */
            :root {
                --brand-color: #022b3a;
            }

            .logo-text {
                font-family: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', sans-serif;
                font-size: 84px;
                font-weight: 900;
                fill: var(--brand-color);
                letter-spacing: -1px;
            }

            .logo-knot {
                fill: var(--brand-color);
                /* Adding a stroke with a round join makes the sharp SVG corners beautifully soft */
                stroke: var(--brand-color);
                stroke-width: 8px;
                stroke-linejoin: round;

                /* Animation settings */
                transform-origin: 200px 20px;
                transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
                cursor: pointer;
            }

            /* Hover interaction */
            .logo-container:hover .logo-knot,
            .logo-knot:hover {
                animation: playful-knot 0.8s ease-in-out infinite alternate;
            }

            /* Keyframes for a smooth hover wiggle/bounce */
            @keyframes playful-knot {
                0% {
                    transform: translateY(0) rotate(-6deg) scale(1.05);
                }

                50% {
                    transform: translateY(-4px) rotate(6deg) scale(1.05);
                }

                100% {
                    transform: translateY(0) rotate(-6deg) scale(1.05);
                }
            }
        </style>
    </defs>

    <g class="logo-container">

        <path class="logo-knot" d="M 165 -10 L 235 -10 L 245 35 L 200 20 L 155 35 Z" />

        <text x="200" y="130" class="logo-text" text-anchor="middle">JustHost</text>

    </g>
</svg>